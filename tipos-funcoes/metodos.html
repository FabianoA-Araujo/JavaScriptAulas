<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos</title>
</head>
<body>
    <h1>Métodos</h1>
    <p>Métodos são funções atreladas a objetos</p>

    <script>
        const produto = {
            nome:"canena",
            estoque: 20,
            comprar: function(qtd){
                if(qtd > produto.estoque){
                    alert(`Estoque insuficiente. Saldo atual: ${produto.estoque}`);
                    return null;
                }
                this.estoque -= qtd
            }
        };

        produto.comprar(21);
        console.log(produto.estoque);
    </script>
</body>
</html>
