<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Função ano bissexto</title>
</head>

<body>
    <h1>Função ano bissexto</h1>

    <p>Crie uma função que retorne um booleano indicando dse um ano é bissexto, que
        são aqueles divisíveis por 4, mas não por 100, exceto se for divisíveil por 400.
    </p>

    
    
    <script>

        function anoBissexto(ano){
            return ((ano % 4 === 0 && ano % 100 !== 0 ) || (ano % 400 === 0 ))
        }

        console.log(anoBissexto(2024))
        
    </script>
    
</body>
</html>
